<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="SignUp.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="flex">
        <div class="logo">🚀</div>
        <p class="main-text">Enter your data</p>
        <p class="below-text">For signing up & <br />To be part of a team</p>
        <div class="row">
          <div>
            <p class="font">FIRST NAME</p>
            <input type="text" placeholder="Jon" />
          </div>
          <div>
            <p class="font">SECOND NAME</p>
            <input type="text" placeholder="Jones" />
          </div>
        </div>
        <p class="font">Email</p>
        <input type="text" placeholder="you@example.com" />
        <p class="font">New Password</p>
        <input type="password" placeholder="Min. 8 characters" />
        <p class="font">Password Confirmation</p>
        <input type="password" placeholder="Repeat password" />
        <div class="btn">
          <a href="index.html"><button>Send</button></a>
        </div>
      </div>
    </div>
  </body>
</html>
